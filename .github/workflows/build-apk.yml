name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # This creates the exact missing debug.keystore file your project is looking for
    - name: Generate Dummy Debug Keystore
      run: |
        mkdir -p app/My-app
        keytool -genkey -v -keystore app/My-app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    - name: Build Debug APK              
      run: |
        gradle assembleDebug --stacktrace > build_log.txt 2>&1 || true
        cat build_log.txt | grep -E -A 5 -B 2 "FAILED|Exception|Error|not found" || true
        echo "=== FULL ERROR SUMMARY BELOW ==="
        tail -n 40 build_log.txt
        exit $(cat build_log.txt | grep -q "BUILD SUCCESSFUL" && echo 0 || echo 1)



    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: app/build/outputs/apk/debug/app-debug.apk
